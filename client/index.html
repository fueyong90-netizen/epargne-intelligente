<!DOCTYPE html>
<!-- lang='fr' : important pour l'accessibilité et les lecteurs d'écran -->
<html lang='fr'>
<head>
  <meta charset='UTF-8'>
  <!-- viewport : OBLIGATOIRE pour le responsive mobile -->
  <!-- width=device-width : adapte à la largeur réelle de l'écran -->
  <!-- initial-scale=1 : pas de zoom au chargement -->
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>💰 Épargne Intelligente</title>
 
  <!-- Polices Google — Inter : moderne, lisible, open source -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'>
 
  <!-- CSS chargé dans l'ordre : main.css définit les variables utilisées par les autres -->
  <link rel='stylesheet' href='styles/main.css'>
  <link rel='stylesheet' href='styles/dashboard.css'>
  <link rel='stylesheet' href='styles/charts.css'>
 
  <!-- Chart.js via CDN — version fixe pour éviter les breaking changes -->
  <script src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js'></script>
</head>
 
<body>
  <!-- ─── SIDEBAR NAVIGATION ─── -->
  <!-- La sidebar est dans le HTML pur — elle ne change jamais -->
  <aside id='sidebar'>
    <div class='sidebar-logo'>
      <span class='logo-icon'>💰</span>
      <span class='logo-text'>Épargne IA</span>
    </div>
 
    <nav class='sidebar-nav'>
      <!-- href='#dashboard' : change window.location.hash → déclenche hashchange -->
      <!-- La classe 'active' est gérée dynamiquement par app.js router() -->
      <a href='#dashboard'    class='nav-link active'>🏠 Dashboard</a>
      <a href='#transactions' class='nav-link'>💳 Transactions</a>
      <a href='#goals'        class='nav-link'>🎯 Objectifs</a>
      <a href='#ai'           class='nav-link'>🤖 Analyse IA</a>
      <a href='#settings'     class='nav-link'>⚙️ Paramètres</a>
    </nav>
 
    <!-- Bouton collapse sidebar sur mobile -->
    <button id='sidebar-toggle' aria-label='Fermer le menu'>✕</button>
  </aside>
 
  <!-- ─── ZONE PRINCIPALE ─── -->
  <main id='main-wrapper'>
    <!-- Bouton hamburger pour ouvrir la sidebar sur mobile -->
    <button id='menu-btn' aria-label='Menu'>☰</button>
 
    <!-- app.js écrit le HTML de chaque page dans cette div -->
    <!-- Le contenu change à chaque navigation (router()) -->
    <div id='app-content'>
      <!-- Contenu chargé dynamiquement par JavaScript -->
      <div class='loading-initial'>
        <div class='spinner'></div>
        <p>Chargement…</p>
      </div>
    </div>
  </main>
 
  <!-- ─── SCRIPTS JAVASCRIPT ─── -->
  <!-- ORDRE OBLIGATOIRE : chaque fichier dépend des précédents -->
 
  <!-- 1. utils.js : zéro dépendance → chargé en premier -->
  <script src='js/utils.js'></script>
 
  <!-- 2. storage.js : utilise Utils.generateId() -->
  <script src='js/storage.js'></script>
 
  <!-- 3. Modules métier : utilisent Utils et Storage -->
  <script src='js/transactions.js'></script>
  <script src='js/goals.js'></script>
  <script src='js/charts.js'></script>
  <script src='js/ai.js'></script>
  <script src='js/dashboard.js'></script>
  <script src='js/settings.js'></script>
 
  <!-- 4. app.js : chargé EN DERNIER car il appelle tous les modules -->
  <!-- DOMContentLoaded dans app.js → garantit que tout est prêt -->
  <script src='js/app.js'></script>
</body>
</html>
